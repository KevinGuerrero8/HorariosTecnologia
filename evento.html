        const eventTitle = localStorage.getItem('eventTitle') || "default";
        const user = users[eventTitle] || users.default;

        const isAvailable = user.status === "disponible";
        const isNoService = user.status === "sin-atencion";

        const statusLabel = isAvailable ? "Disponible" : isNoService ? "Sin atención" : "En turno";
        const statusClass = isAvailable ? "badge--available" : isNoService ? "badge--offline" : "badge--active";
        const modeTag = user.mode ? `<span class="mode-tag">${user.mode}</span>` : "";
        const contactHTML = user.phone ? `
            <div class="contact-row" id="phone-row">
                <img src="assets/img/Icono_Wa.webp" alt="WhatsApp" class="wa-icon">
                <span>${user.phone}</span>
            </div>
        ` : "";
        const emailHTML = user.email ? `<p class="profile-email">${user.email}</p>` : "";
        const deptHTML = user.dept ? `<p class="profile-dept">${user.dept}</p>` : "";

        document.getElementById('profile-card').innerHTML = `
            <div class="profile-avatar-wrap">
                <img src="${user.avatar}" alt="${user.name}" class="profile-avatar">
                <span class="status-badge ${statusClass}">${statusLabel}</span>
            </div>
            <div class="profile-info">
                <div class="profile-name-row">
                    <h2 class="profile-name">${user.name}</h2>
                    ${modeTag}
                </div>
                ${deptHTML}
                ${emailHTML}
                ${contactHTML}
            </div>
        `;

        if (user.phone) {
            document.getElementById('phone-row').addEventListener('click', () => {
                window.location.href = user.redirect;
            });
            document.getElementById('phone-row').style.cursor = 'pointer';
        }

        const fechaActual = new Date();
        const opciones = { year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('fecha').textContent = fechaActual.toLocaleDateString('es-ES', opciones);

        function updateHora() {
            document.getElementById('hora').textContent = new Date().toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }
        updateHora();
        setInterval(updateHora, 1000);
    </script>
