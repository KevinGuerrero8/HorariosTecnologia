<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horarios Domicity</title>
    <link rel="icon" href="/assets/img/logo_domicity.png" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,300&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>

    <div class="bg-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <main class="main-container main-container--wide">

        <header class="site-header site-header--small">
            <div class="logo-wrap">
                <img src="/assets/img/logo_domicity.png" alt="Domicity" class="logo logo--small">
            </div>
            <div class="header-text">
                <h1 class="site-title site-title--small">Horarios <em>Domicity</em></h1>
                <p id="page-subtitle" class="site-subtitle"></p>
            </div>
        </header>

        <div class="datetime-bar">
            <span id="fecha"></span>
            <span class="sep">·</span>
            <span id="hora"></span>
        </div>

        <div id="events-grid" class="events-grid">
            <!-- filled by JS -->
        </div>

        <button class="btn btn-ghost back-btn" onclick="window.history.back()">
            ← Regresar
        </button>

    </main>

    <script>
        const eventConfig = {
            "Kevin Presencial":   { avatar: "/assets/img/Avatar_Kevin.png",   email: "Tecnologia2@domicity.com.co", phone: "310 3325067", redirect: "https://wa.me/+573103325067", status: "ocupado" },
            "Kevin Remoto":       { avatar: "/assets/img/Avatar_Kevin.png",   email: "Tecnologia2@domicity.com.co", phone: "310 3325067", redirect: "https://wa.me/+573103325067", status: "ocupado" },
            "Kevin Disponible":   { avatar: "/assets/img/Avatar_Kevin.png",   email: "Tecnologia2@domicity.com.co", phone: "310 3325067", redirect: "https://wa.me/+573103325067", status: "disponible" },
            "Benyy Presencial":   { avatar: "/assets/img/Avatar_Benyy.png",   email: "Benyy@domicity.com.co",       phone: "320 4911339", redirect: "https://wa.me/+573204911339", status: "ocupado" },
            "Benyy Remoto":       { avatar: "/assets/img/Avatar_Benyy.png",   email: "Benyy@domicity.com.co",       phone: "320 4911339", redirect: "https://wa.me/+573204911339", status: "ocupado" },
            "Benyy Disponible":   { avatar: "/assets/img/Avatar_Benyy.png",   email: "Benyy@domicity.com.co",       phone: "320 4911339", redirect: "https://wa.me/+573204911339", status: "disponible" },
            "Lizeth Presencial":  { avatar: "/assets/img/Avatar_Lizeth.png",  email: "Tecnologia@domicity.com.co",  phone: "320 7693195", redirect: "https://wa.me/+573207693195", status: "ocupado" },
            "Lizeth Remoto":      { avatar: "/assets/img/Avatar_Lizeth.png",  email: "Tecnologia@domicity.com.co",  phone: "320 7693195", redirect: "https://wa.me/+573207693195", status: "ocupado" },
            "Jhonatan Presencial":{ avatar: "/assets/img/Avatar_Jhonatan.png",email: "lidercampana3@domicity.com.co",phone: "321 2366880", redirect: "https://wa.me/+573212366880", status: "ocupado" },
            "Jhonatan Remoto":    { avatar: "/assets/img/Avatar_Jhonatan.png",email: "lidercampana3@domicity.com.co",phone: "321 2366880", redirect: "https://wa.me/+573212366880", status: "ocupado" },
            "Juan Presencial":    { avatar: "/assets/img/Avatar_Juan.png",    email: "lidercampana2@domicity.com.co",phone: "321 2366880", redirect: "https://wa.me/+573212366880", status: "ocupado" },
            "Juan Remoto":        { avatar: "/assets/img/Avatar_Juan.png",    email: "lidercampana2@domicity.com.co",phone: "321 2366880", redirect: "https://wa.me/+573212366880", status: "ocupado" },
            "Deiver Presencial":  { avatar: "/assets/img/Avatar_Deiver.png",  email: "lidercampana@domicity.com.co", phone: "321 2366880", redirect: "https://wa.me/+573212366880", status: "ocupado" },
            "Deiver Remoto":      { avatar: "/assets/img/Avatar_Deiver.png",  email: "lidercampana@domicity.com.co", phone: "321 2366880", redirect: "https://wa.me/+573212366880", status: "ocupado" },
            default: { avatar: "/assets/img/Avatar_Zzz.png", email: "", phone: "", redirect: "#", status: "sin-atencion" }
        };

        function convertirHoraAMinutos(hora) {
            if (!hora || hora === "Hora no disponible") return null;
            const match = hora.match(/(\d{1,2}):(\d{2})\s*(a\.\s*m\.|p\.\s*m\.)/i);
            if (!match) return null;
            let horas = parseInt(match[1]);
            const minutos = parseInt(match[2]);
            const periodo = match[3].toLowerCase();
            if (periodo.includes('p') && horas !== 12) horas += 12;
            else if (periodo.includes('a') && horas === 12) horas = 0;
            return horas * 60 + minutos;
        }

        function isEventoCurrent(horaInicio, horaFin) {
            const ahora = new Date();
            const minutosAhora = ahora.getHours() * 60 + ahora.getMinutes();
            const minutosInicio = convertirHoraAMinutos(horaInicio);
            const minutosFin = convertirHoraAMinutos(horaFin);
            if (minutosInicio === null || minutosFin === null) return false;
            return minutosAhora >= minutosInicio && minutosAhora <= minutosFin;
        }

        const eventDetails = JSON.parse(localStorage.getItem("eventDetails")) || [];
        const selectedDate = localStorage.getItem("selectedDate") || "";

        const formatSelectedDate = (dateString) => {
            if (!dateString) return "";
            const date = new Date(dateString);
            const localDate = new Date(date.getTime() + date.getTimezoneOffset() * 60000);
            const day = String(localDate.getDate()).padStart(2, "0");
            const month = String(localDate.getMonth() + 1).padStart(2, "0");
            const year = localDate.getFullYear();
            return `${day}/${month}/${year}`;
        };

        document.getElementById('page-subtitle').textContent = `Horarios del ${formatSelectedDate(selectedDate)}`;

        const fechaActual = new Date();
        document.getElementById('fecha').textContent = fechaActual.toLocaleDateString('es-ES', { year: 'numeric', month: 'long', day: 'numeric' });
        function updateHora() {
            document.getElementById('hora').textContent = new Date().toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }
        updateHora();
        setInterval(updateHora, 1000);

        const grid = document.getElementById('events-grid');

        if (eventDetails.length > 0) {
            eventDetails.forEach((event, i) => {
                const configKey = Object.keys(eventConfig).find(k => event.title.includes(k));
                const config = configKey ? eventConfig[configKey] : eventConfig.default;
                const isCurrent = isEventoCurrent(event.start, event.end);
                const isAvail = config.status === "disponible";

                const statusLabel = isAvail ? "Disponible" : isCurrent ? "Activo ahora" : "En turno";
                const statusClass = isAvail ? "badge--available" : isCurrent ? "badge--active" : "badge--scheduled";

                const card = document.createElement('div');
                card.classList.add('card', 'event-card');
                if (isCurrent) card.classList.add('event-card--current');

                card.style.animationDelay = `${i * 80}ms`;

                card.innerHTML = `
                    <div class="event-card-header">
                        <img src="${config.avatar}" alt="${event.title}" class="event-avatar">
                        <span class="status-badge ${statusClass}">${statusLabel}</span>
                    </div>
                    <div class="event-card-body">
                        <h3 class="event-title">${event.title}</h3>
                        <p class="event-time">⏰ ${event.start || "—"} → ${event.end || "—"}</p>
                        ${config.email ? `<p class="event-email">✉️ ${config.email}</p>` : ""}
                        ${config.phone ? `
                        <div class="event-contact" onclick="window.location.href='${config.redirect}'">
                            <img src="assets/img/Icono_Wa.webp" alt="WhatsApp" class="wa-icon">
                            <span>${config.phone}</span>
                        </div>` : ""}
                    </div>
                `;
                grid.appendChild(card);
            });
        } else {
            grid.innerHTML = `
                <div class="card empty-card">
                    <img src="/assets/img/Avatar_Zzz.png" alt="Sin eventos" class="empty-avatar">
                    <h2>Sin horarios disponibles</h2>
                    <p>No hay eventos programados para esta fecha.</p>
                </div>
            `;
        }
    </script>
</body>
</html>
