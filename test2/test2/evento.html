<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horarios Domicity</title>
    <link rel="icon" href="/assets/img/logo_domicity.png" type="image/x-icon">
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>

    <div class="sidebar-strip"></div>

    <div class="main-container">

        <div class="logo-lockup">
            <img src="/assets/img/logo_domicity.png" alt="Domicity" class="logo logo--sm">
            <span class="logo-label">Domicity · Horarios</span>
        </div>

        <div class="datetime-bar">
            <span id="fecha"></span>
            <span class="sep">|</span>
            <span id="hora"></span>
            <span class="sep">|</span>
            <span class="live-pill"><span class="live-dot"></span>En vivo</span>
        </div>

        <!-- Profile card — big image hero -->
        <div class="card profile-card" id="profile-card">
            <!-- filled by JS -->
        </div>

        <!-- Back to query options, not to login -->
        <button class="btn btn-ghost back-btn" onclick="goBack()">← Regresar</button>

    </div>

    <script>
        function goBack() {
            // Go back to index.html restoring the query section (not login)
            sessionStorage.setItem('restoreStep', 'query');
            window.location.href = 'index.html';
        }

        const users = {
            "Kevin Presencial":   { name:"Kevin Guerrero",   mode:"Presencial",  avatar:"/assets/img/Avatar_Kevin.png",    email:"Tecnologia2@domicity.com.co",   phone:"310 3325067", redirect:"https://wa.me/+573103325067",  dept:"Tecnología",  status:"ocupado"      },
            "Kevin Remoto":       { name:"Kevin Guerrero",   mode:"Remoto",      avatar:"/assets/img/Avatar_Kevin.png",    email:"Tecnologia2@domicity.com.co",   phone:"310 3325067", redirect:"https://wa.me/+573103325067",  dept:"Tecnología",  status:"ocupado"      },
            "Kevin Disponible":   { name:"Kevin Guerrero",   mode:"Disponible",  avatar:"/assets/img/Avatar_Kevin.png",    email:"Tecnologia2@domicity.com.co",   phone:"310 3325067", redirect:"https://wa.me/+573103325067",  dept:"Tecnología",  status:"disponible"   },
            "Benyy Presencial":   { name:"Benyy Castillo",   mode:"Presencial",  avatar:"/assets/img/Avatar_Benyy.png",    email:"Benyy@domicity.com.co",         phone:"320 4911339", redirect:"https://wa.me/+573204911339",  dept:"Tecnología",  status:"ocupado"      },
            "Benyy Remoto":       { name:"Benyy Castillo",   mode:"Remoto",      avatar:"/assets/img/Avatar_Benyy.png",    email:"Benyy@domicity.com.co",         phone:"320 4911339", redirect:"https://wa.me/+573204911339",  dept:"Tecnología",  status:"ocupado"      },
            "Benyy Disponible":   { name:"Benyy Castillo",   mode:"Disponible",  avatar:"/assets/img/Avatar_Benyy.png",    email:"Benyy@domicity.com.co",         phone:"320 4911339", redirect:"https://wa.me/+573204911339",  dept:"Tecnología",  status:"disponible"   },
            "Jhonatan Presencial":{ name:"Jhonatan",         mode:"Presencial",  avatar:"/assets/img/Avatar_Jhonatan.png", email:"lidercampana3@domicity.com.co", phone:"321 2366880", redirect:"https://wa.me/+573212366880",  dept:"Tecnología",  status:"ocupado"      },
            "Jhonatan Remoto":    { name:"Jhonatan",         mode:"Remoto",      avatar:"/assets/img/Avatar_Jhonatan.png", email:"lidercampana3@domicity.com.co", phone:"321 2366880", redirect:"https://wa.me/+573212366880",  dept:"Tecnología",  status:"ocupado"      },
            "Juan Presencial":    { name:"Juan",             mode:"Presencial",  avatar:"/assets/img/Avatar_Juan.png",     email:"lidercampana2@domicity.com.co", phone:"321 2366880", redirect:"https://wa.me/+573212366880",  dept:"Tecnología",  status:"ocupado"      },
            "Juan Remoto":        { name:"Juan",             mode:"Remoto",      avatar:"/assets/img/Avatar_Juan.png",     email:"lidercampana2@domicity.com.co", phone:"321 2366880", redirect:"https://wa.me/+573212366880",  dept:"Tecnología",  status:"ocupado"      },
            "Deiver Presencial":  { name:"Deiver",           mode:"Presencial",  avatar:"/assets/img/Avatar_Deiver.png",   email:"lidercampana@domicity.com.co",  phone:"321 2366880", redirect:"https://wa.me/+573212366880",  dept:"Tecnología",  status:"ocupado"      },
            "Deiver Remoto":      { name:"Deiver",           mode:"Remoto",      avatar:"/assets/img/Avatar_Deiver.png",   email:"lidercampana@domicity.com.co",  phone:"321 2366880", redirect:"https://wa.me/+573212366880",  dept:"Tecnología",  status:"ocupado"      },
            "Lizeth Presencial":  { name:"Lizeth Martínez",  mode:"Presencial",  avatar:"/assets/img/Avatar_Lizeth.png",   email:"Tecnologia@domicity.com.co",    phone:"320 7693195", redirect:"https://wa.me/+573207693195",  dept:"Call Center", status:"ocupado"      },
            "Lizeth Remoto":      { name:"Lizeth Martínez",  mode:"Remoto",      avatar:"/assets/img/Avatar_Lizeth.png",   email:"Tecnologia@domicity.com.co",    phone:"320 7693195", redirect:"https://wa.me/+573207693195",  dept:"Call Center", status:"ocupado"      },
            default: { name:"Sin atención", mode:"", avatar:"/assets/img/Avatar_Zzz.png", email:"", phone:"", redirect:"#", dept:"", status:"sin-atencion" }
        };

        const eventTitle = localStorage.getItem('eventTitle') || "default";
        const user = users[eventTitle] || users.default;
        const isAvail = user.status === "disponible";
        const isOff   = user.status === "sin-atencion";

        // const statusLabel = isAvail ? "Disponible" : isOff ? "Sin atención" : "En turno";

        let statusLabel = "";

        if (isAvail) {
            statusLabel = "Disponible";
        } else if (isOff) {
            statusLabel = "Sin atención";
        } else {
            statusLabel = user.mode 
                ? `En turno · ${user.mode}` 
                : "En turno";
        }


        const statusClass = isAvail ? "badge--available" : isOff ? "badge--offline" : "badge--active";

        document.getElementById('profile-card').innerHTML = `
            <div class="profile-hero">
                <img src="${user.avatar}" alt="${user.name}" class="profile-avatar">
            </div>
            <div class="profile-info-section">
                <div class="profile-status-wrap">
                    <span class="status-badge ${statusClass}">${statusLabel}</span>
                </div>
                <div class="profile-name-row">
                    <h2 class="profile-name">${user.name}</h2> 
                </div>
                ${user.dept  ? `<p class="profile-dept">${user.dept}</p>`   : ""}
                ${user.email ? `<p class="profile-email">${user.email}</p>` : ""}
                ${user.phone ? `
                <div class="contact-row" id="phone-row">
                    <img src="assets/img/Icono_Wa.webp" alt="WhatsApp" class="wa-icon">
                    <span>${user.phone}</span>
                </div>` : ""}
            </div>
        `;

        if (user.phone) {
            document.getElementById('phone-row').addEventListener('click', () => window.location.href = user.redirect);
        }

        const now = new Date();
        document.getElementById('fecha').textContent = now.toLocaleDateString('es-ES', { year:'numeric', month:'long', day:'numeric' });
        function tick() { document.getElementById('hora').textContent = new Date().toLocaleTimeString('es-ES', { hour:'2-digit', minute:'2-digit', second:'2-digit' }); }
        tick(); setInterval(tick, 1000);
    </script>
</body>
</html>
